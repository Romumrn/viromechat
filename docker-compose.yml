services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: virus-mcp-server
    env_file:
      - .env.mcp
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      # No curl in the slim image — a plain Python request is enough to know
      # the MCP server is up. Gates the "app" service's startup below.
      #
      # The MCP server replies 406 to a bare GET on /mcp (it expects proper
      # MCP-protocol headers, which a healthcheck has no business sending) —
      # urlopen() raises HTTPError on any 4xx/5xx, so that has to be treated
      # as "server is up and answering HTTP", not as a failure. Only a
      # connection-level error (nothing listening yet) should fail the check.
      test:
        - "CMD"
        - "python"
        - "-c"
        - |
          import sys, urllib.error, urllib.request
          try:
              urllib.request.urlopen("http://localhost:8000/mcp", timeout=3)
          except urllib.error.HTTPError:
              pass
          except Exception:
              sys.exit(1)
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: virus-ai-agent
    environment:
      - STREAMLIT_BROWSER_GATHERUSAGESTATS=false
      # app.py and server_mcp.py are now separate containers — "localhost"
      # would no longer reach the MCP server, so point it at the "mcp"
      # service by its Compose network name instead.
      - MCP_SERVER_URL=http://mcp:8000/mcp
    env_file:
      - .env.app
    volumes:
      - ./logs:/app/logs
      - ./.streamlit:/app/.streamlit:ro
      # Host bind-mount: the accounts file lives directly on the VM at
      # ./auth_data/.streamlit_auth.yaml, so it can be read/edited/backed up
      # without going through the container. The directory is tracked in git
      # (auth_data/.gitkeep) so it exists — owned by the host user — before
      # the first "up"; the container's app user is uid 1000, which matches
      # the default first user on an Ubuntu VM. If accounts fail to save with
      # a PermissionError on some host, run: sudo chown -R 1000:1000 auth_data
      - ./auth_data:/app/auth_data
    ports:
      - "8501:8501"
    depends_on:
      mcp:
        condition: service_healthy
    restart: unless-stopped
